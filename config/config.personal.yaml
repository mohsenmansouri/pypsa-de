            rural ground heat pump: { min: 800, max: 6000 }
            urban central air heat pump: { min: 2500, max: 10000 }
            urban decentral air heat pump: { min: 2500, max: 10000 }
          # Updated based on NEP B 2037
          2040:
            # Total household heat pumps: 63.9 TWh / 2000h = ~32 GW
            # Distributed across 4 types (with more weight to urban)
            rural air heat pump: { min: 5500, max: 5500 }
            rural ground heat pump: { min: 4500, max: 4500 }
            urban central air heat pump: { min: 11000, max: 11000 }
            urban decentral air heat pump: { min: 11000, max: 11000 }
          # Updated based on NEP B 2045
          2045:
            # Total household heat pumps: 76.6 TWh / 2000h = ~38.3 GW
            rural air heat pump: { min: 6500, max: 6500 }
            rural ground heat pump: { min: 5500, max: 5500 }
            urban central air heat pump: { min: 13150, max: 13150 }
            urban decentral air heat pump: { min: 13150, max: 13150 }

        optimistic: # More ambitious than NEP scenario B
          # Previous years unchanged
          2020:
            rural air heat pump: { min: 0, max: 1000 }
            rural ground heat pump: { min: 0, max: 1000 }
            urban central air heat pump: { min: 0, max: 1500 }
            urban decentral air heat pump: { min: 0, max: 1500 }
          2025:
            rural air heat pump: { min: 400, max: 2500 }
            rural ground heat pump: { min: 200, max: 2000 }
            urban central air heat pump: { min: 800, max: 4000 }
            urban decentral air heat pump: { min: 800, max: 4000 }
          2030:
            rural air heat pump: { min: 800, max: 5000 }
            rural ground heat pump: { min: 500, max: 4000 }
            urban central air heat pump: { min: 1500, max: 8000 }
            urban decentral air heat pump: { min: 1500, max: 8000 }
          2035:
            rural air heat pump: { min: 1500, max: 7000 }
            rural ground heat pump: { min: 800, max: 6000 }
            urban central air heat pump: { min: 2500, max: 10000 }
            urban decentral air heat pump: { min: 2500, max: 10000 }
          # Updated based on NEP B 2037
          2040:
            # Total household heat pumps: 63.9 TWh / 2000h = ~32 GW
            # Distributed across 4 types (with more weight to urban)
            rural air heat pump: { min: 5500, max: 5500 }
            rural ground heat pump: { min: 4500, max: 4500 }
            urban central air heat pump: { min: 11000, max: 11000 }
            urban decentral air heat pump: { min: 11000, max: 11000 }
          # Updated based on NEP B 2045
          2045:
            # Total household heat pumps: 76.6 TWh / 2000h = ~38.3 GW
            rural air heat pump: { min: 6500, max: 6500 }
            rural ground heat pump: { min: 5500, max: 5500 }
            urban central air heat pump: { min: 13150, max: 13150 }
            urban decentral air heat pump: { min: 13150, max: 13150 }
