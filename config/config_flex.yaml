# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#run
run:
  prefix: 20250414-NEP-flex
  
# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#sector
sector:
  test: 3
  tes_tau:
    decentral: 6
    central: 180
  low_voltage_dsm:
    enable: true
    #scenario: "enhanced_flexibility"  # Add this identifier
    "2030":
      electricity:
        s_util: 0.67
        s_flex: 0.5
        s_inc: 1
        s_dec: 0
        delta_t: 4
      industry electricity:
        s_util: 0.67
        s_flex: 0.5
        s_inc: 0.9
        s_dec: 0.5
        delta_t: 4
    "2040":
      electricity:
        s_util: 0.67
        s_flex: 0.5
        s_inc: 1
        s_dec: 0
        delta_t: 6
      industry electricity:
        s_util: 0.67
        s_flex: 0.5
        s_inc: 0.9
        s_dec: 0.5
        delta_t: 6
    "2045":
      electricity:
        s_util: 0.67
        s_flex: 0.5
        s_inc: 1
        s_dec: 0
        delta_t: 6
      industry electricity:
        s_util: 0.67
        s_flex: 0.5
        s_inc: 0.9
        s_dec: 0.5
        delta_t: 6
  
solving:
  constraints:
    generator_phaseout:
      apply_constraints: true

      # CCGT phase-out
      CCGT:
        phase_out_year: 2045
        capacity_limits:
          2030: 0.9
          2035: 0.7
          2040: 0.4
          2045: 0.0

      # OCGT phase-out
      OCGT:
        phase_out_year: 2050
        capacity_limits:
          2030: 0.6
          2035: 0.3
          2040: 0.2
          2045: 0.1
          2050: 0.0

      # Urban gas CHP phase-out
      urban_central_gas_CHP:
        phase_out_year: 2045
        capacity_limits:
          2030: 0.8
          2035: 0.5
          2040: 0.2
          2045: 0.0

      # CC CHP gas phase-out (can be different from non-CC)
      urban_central_gas_CHP_CC:
        phase_out_year: 2050
        capacity_limits:
          2035: 1
          2040: 1
          2045: 0.5
          2050: 0

      # Urban oil CHP phase-out
      urban_central_oil_CHP:
        phase_out_year: 2035
        capacity_limits:
          2025: 0.5
          2030: 0.2
          2035: 0.0

      # Waste CHP phase-out
      waste_CHP:
        phase_out_year: 2045
        capacity_limits:
          2030: 0.7
          2035: 0.3
          2040: 0.2
          2045: 0.0

      # Waste CHP CC phase-out
      waste_CHP_CC:
        phase_out_year: 2050
        capacity_limits:
          2035: 1
          2040: 1
          2045: 1
          2050: 0
      # Biomass CHP phase-out - conventional
      urban_central_solid_biomass_CHP:
        phase_out_year: 2045
        capacity_limits:
          2030: 0.9
          2035: 0.7
          2040: 0.2
          2045: 0.0
          2050: 0

      # Biomass CHP CC phase-out
      urban_central_solid_biomass_CHP_CC:
        phase_out_year: 2045  # Later phase-out for CC versions
        capacity_limits:
          2035: 1
          2040: 1
          2045: 0
          2050: 0
      other_biomass: 
        phase_out_year: 2045
        capacity_limits:
          2030: 0.9
          2035: 0.7
          2040: 0.2
          2045: 0.0
          2050: 0

      # No phase-out for H2 technologies (empty config means no constraints)
      urban_central_H2_CHP: { }
      H2_OCGT: { }
      H2_retrofit_OCGT: { }
    resistive_heaters:
      apply_constraints: true
      active_scenario: "restrictive"
      countries: [ "DE" ]

      scenarios:
        restrictive: # Following NEP scenario B
          # Previous years unchanged
          2020:
            rural resistive heater: { max: 2000 }
            urban central resistive heater: { max: 3000 }
            urban decentral resistive heater: { max: 3000 }
          2025:
            rural resistive heater: { max: 2000 }
            urban central resistive heater: { max: 3000 }
            urban decentral resistive heater: { max: 3000 }
          2030:
            rural resistive heater: { max: 2000 }
            urban central resistive heater: { max: 3000 }
            urban decentral resistive heater: { max: 3000 }
          2035:
            rural resistive heater: { max: 1000 }
            urban central resistive heater: { max: 1500 }
            urban decentral resistive heater: { max: 1500 }
          # Updated based on NEP B 2037 (7.5 GW total)
          2040:
            rural resistive heater: { max: 2500 }
            urban central resistive heater: { max: 2500 }
            urban decentral resistive heater: { max: 2500 }
          # Updated based on NEP B 2045 (12.1 GW total)
          2045:
            rural resistive heater: { max: 4000 }
            urban central resistive heater: { max: 4050 }
            urban decentral resistive heater: { max: 4050 }
    heat_pumps:
      apply_constraints: true
      active_scenario: "conservative"
      countries: [ "DE" ]

      scenarios:
        conservative: # Following NEP scenario B
          # Previous years unchanged
          2020:
            rural air heat pump: { min: 0, max: 1000 }
            rural ground heat pump: { min: 0, max: 1000 }
            urban central air heat pump: { min: 0, max: 1500 }
            urban decentral air heat pump: { min: 0, max: 1500 }
          2025:
            rural air heat pump: { min: 400, max: 2500 }
            rural ground heat pump: { min: 200, max: 2000 }
            urban central air heat pump: { min: 800, max: 4000 }
            urban decentral air heat pump: { min: 800, max: 4000 }
          2030:
            rural air heat pump: { min: 800, max: 5000 }
            rural ground heat pump: { min: 500, max: 4000 }
            urban central air heat pump: { min: 1500, max: 8000 }
            urban decentral air heat pump: { min: 1500, max: 8000 }
          2035:
            rural air heat pump: { min: 1500, max: 7000 }
            rural ground heat pump: { min: 800, max: 6000 }
            urban central air heat pump: { min: 2500, max: 10000 }
            urban decentral air heat pump: { min: 2500, max: 10000 }
          # Updated based on NEP B 2037
          2040:
            # Total household heat pumps: 63.9 TWh / 2000h = ~32 GW
            # Distributed across 4 types (with more weight to urban)
            rural air heat pump: { min: 5500, max: 5500 }
            rural ground heat pump: { min: 4500, max: 4500 }
            urban central air heat pump: { min: 11000, max: 11000 }
            urban decentral air heat pump: { min: 11000, max: 11000 }
          # Updated based on NEP B 2045
          2045:
            # Total household heat pumps: 76.6 TWh / 2000h = ~38.3 GW
            rural air heat pump: { min: 6500, max: 6500 }
            rural ground heat pump: { min: 5500, max: 5500 }
            urban central air heat pump: { min: 13150, max: 13150 }
            urban decentral air heat pump: { min: 13150, max: 13150 }
